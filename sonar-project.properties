sonar.projectKey=rohanvinaik_ModelAtlas
sonar.organization=rohanvinaik

sonar.projectName=ModelAtlas
sonar.projectVersion=0.2.0

# Source layout
sonar.sources=src/
sonar.tests=tests/
sonar.python.version=3.11

# Coverage report (generated by pytest-cov in CI)
sonar.python.coverage.reportPaths=coverage.xml

# Exclusions — keep metrics honest by excluding non-production code
sonar.exclusions=\
  **/mutants/**,\
  **/.claude/**,\
  **/deploy/**,\
  **/__pycache__/**,\
  network.db

# Don't flag test files for duplication or complexity
sonar.cpd.exclusions=tests/**

# Coverage exclusions — files/functions that genuinely cannot be unit-tested
# because they call external APIs, load ML models, or are CLI entrypoints.
# Rationale documented per entry.
sonar.coverage.exclusions=\
  tests/**,\
  src/model_atlas/ingest.py,\
  src/model_atlas/ingest_seed.py,\
  src/model_atlas/phase_c_worker.py,\
  src/model_atlas/search/structured.py,\
  src/model_atlas/sources/huggingface.py,\
  src/model_atlas/sources/ollama.py,\
  src/model_atlas/sources/base.py

# Treat these as test sources (not counted for production coverage)
sonar.test.inclusions=tests/**/*.py
