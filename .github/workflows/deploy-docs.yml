name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/wiki/**'
      - 'wiki.yaml'
      - 'scripts/publish_pages.py'
      - 'scripts/wiki_transforms.py'
      - 'src/model_atlas/wiki/**'

  workflow_dispatch:

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Materialize wiki
        run: uv run python -m model_atlas.wiki materialize

      - name: Build static site
        run: uv run python scripts/publish_pages.py --out-dir _site --check-links

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
