expansions:
  - label: "biology-domain"
    bank: "DOMAIN"
    category: "specialization"
    mode: "auto_link"
    match_rules:
      operator: "OR"
      conditions:
        - type: "tag_exact"
          value: "biology"
        - type: "name_regex"
          value: "\\b(?:bio(?:logy|med|informatics|gpt)|genomic|proteom|dna|rna|protein)\\b"
      min_matches: 1
    confidence: 0.7

  - label: "chemistry-domain"
    bank: "DOMAIN"
    category: "specialization"
    mode: "auto_link"
    match_rules:
      operator: "OR"
      conditions:
        - type: "tag_exact"
          value: "chemistry"
        - type: "name_regex"
          value: "\\b(?:chem|molecule|molecular|smiles|drug(?:like)?)\\b"
      min_matches: 1
    confidence: 0.7

  - label: "physics-domain"
    bank: "DOMAIN"
    category: "specialization"
    mode: "auto_link"
    match_rules:
      operator: "OR"
      conditions:
        - type: "tag_exact"
          value: "physics"
        - type: "name_regex"
          value: "\\b(?:physics|quantum|astro|cosmol)\\b"
      min_matches: 1
    confidence: 0.7

  - label: "music-domain"
    bank: "DOMAIN"
    category: "specialization"
    mode: "auto_link"
    match_rules:
      operator: "OR"
      conditions:
        - type: "tag_exact"
          value: "music"
        - type: "name_regex"
          value: "\\b(?:music|audio(?:gen|craft)|midi|melody)\\b"
      min_matches: 1
    confidence: 0.7

  - label: "speech-domain"
    bank: "DOMAIN"
    category: "specialization"
    mode: "auto_link"
    match_rules:
      operator: "OR"
      conditions:
        - type: "pipeline_tag_in"
          value: ["text-to-speech", "automatic-speech-recognition", "voice-activity-detection"]
        - type: "tag_exact"
          value: "text-to-speech"
        - type: "tag_exact"
          value: "automatic-speech-recognition"
        - type: "name_regex"
          value: "\\b(?:tts|asr|speech|whisper|bark|parler|kokoro|piper|vits|voice(?:clone|craft)?)\\b"
      min_matches: 1
    confidence: 0.7

  - label: "audio-domain"
    bank: "DOMAIN"
    category: "specialization"
    mode: "auto_link"
    match_rules:
      operator: "OR"
      conditions:
        - type: "pipeline_tag_in"
          value: ["text-to-audio", "audio-to-audio", "audio-classification", "audio-text-to-text"]
        - type: "tag_exact"
          value: "audio"
        - type: "name_regex"
          value: "\\b(?:audio(?:lm|palm|gen|ldm|craft)|sound|noise|acoustic)\\b"
      min_matches: 1
    confidence: 0.7
