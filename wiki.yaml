materializer_version: "0.2.0"

defaults:
  theory_scope: false
  audience: user

rails:
  getting-value-fast:
    name: "Getting Value Fast"
  how-it-works:
    name: "How It Works"
  why-designed-this-way:
    name: "Why It Is Designed This Way"
  reference:
    name: "Reference"

pages:
  # --- Home (no rail) ---
  - id: home
    title: "Home"
    audience: user
    sources:
      - path: docs/wiki/home.md
        sections: all

  # --- Getting Value Fast ---
  - id: getting-started
    title: "Getting Started"
    audience: user
    rail: getting-value-fast
    chapter: 1
    prerequisites: []
    sources:
      - path: docs/wiki/getting-started.md
        sections: all

  - id: query-examples
    title: "Query Examples"
    audience: user
    rail: getting-value-fast
    chapter: 2
    prerequisites: [getting-started]
    sources:
      - path: docs/wiki/query-examples.md
        sections: all

  # --- How It Works ---
  - id: system-overview
    title: "System Overview"
    audience: operator
    rail: how-it-works
    chapter: 1
    prerequisites: []
    sources:
      - path: docs/wiki/system-overview.md
        sections: all

  - id: query-engine
    title: "Query Engine"
    audience: operator
    rail: how-it-works
    chapter: 2
    prerequisites: [system-overview]
    sources:
      - path: docs/wiki/query-engine.md
        sections: all

  - id: extraction-pipeline
    title: "Extraction Pipeline"
    audience: operator
    rail: how-it-works
    chapter: 3
    prerequisites: [system-overview]
    sources:
      - path: docs/wiki/extraction-pipeline.md
        sections: all

  - id: data-model
    title: "Data Model"
    audience: operator
    rail: how-it-works
    chapter: 4
    prerequisites: [system-overview]
    sources:
      - path: docs/wiki/data-model.md
        sections: all

  - id: data-distribution
    title: "Data Distribution"
    audience: operator
    rail: how-it-works
    chapter: 5
    prerequisites: []
    sources:
      - path: docs/wiki/data-distribution.md
        sections: all

  # --- Why It Is Designed This Way ---
  - id: the-gap
    title: "The Gap"
    audience: theory
    rail: why-designed-this-way
    chapter: 1
    prerequisites: []
    sources:
      - path: docs/wiki/the-gap.md
        sections: all

  - id: signed-hierarchies
    title: "Signed Hierarchies"
    audience: theory
    rail: why-designed-this-way
    chapter: 2
    prerequisites: [the-gap]
    sources:
      - path: docs/wiki/signed-hierarchies.md
        sections: all

  - id: emergent-similarity
    title: "Emergent Similarity"
    audience: theory
    rail: why-designed-this-way
    chapter: 3
    prerequisites: [signed-hierarchies]
    sources:
      - path: docs/wiki/emergent-similarity.md
        sections: all

  - id: navigation-geometry
    title: "Navigation Geometry"
    audience: theory
    rail: why-designed-this-way
    chapter: 4
    prerequisites: [emergent-similarity]
    sources:
      - path: docs/wiki/navigation-geometry.md
        sections: all

  # --- Reference ---
  - id: glossary
    title: "Glossary"
    audience: user
    rail: reference
    chapter: 1
    prerequisites: []
    sources:
      - path: docs/wiki/glossary.md
        sections: all

  - id: concept-map
    title: "Concept Map"
    audience: user
    rail: reference
    chapter: 2
    prerequisites: []
    sources:
      - path: docs/wiki/concept-map.md
        sections: all

promotions: []
