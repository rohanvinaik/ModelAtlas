[project]
name = "model-atlas"
version = "0.2.0"
description = "MCP server exposing a navigable semantic network of ML models"
requires-python = ">=3.10"
dependencies = [
    "mcp[cli]>=1.0.0",
    "huggingface-hub>=0.20.0",
    "rapidfuzz>=3.0.0",
    "markdown>=3.10.2",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-cov>=6.0.0",
    "ruff>=0.8.0",
]
ingest = [
    "outlines>=0.1.0",
    "transformers>=4.40.0",
    "torch>=2.0.0",
    "openai>=1.0.0",
    "datasets>=2.0.0",
]

[project.scripts]
model-atlas = "model_atlas.server:main"
model-atlas-ingest = "model_atlas.ingest_cli:main"

[tool.pytest.ini_options]
markers = ["detective: test generated by Detective"]
# Scope discovery to `tests/` so pytest never walks the mutants/ shadow tree
# mutmut creates. Both trees have a `tests/conftest.py`, and default rootdir
# discovery would try to import both as `tests.conftest` → ImportPathMismatchError,
# which cascades into ImportErrors across `tests/generated/` and (via Wesker's
# session-abort semantics) makes Detective report "no live pytest session".
testpaths = ["tests"]
# `testpaths` only applies when pytest is called without explicit path args.
# Wesker's live-suite seam passes explicit paths (its reachability set, or "."),
# so testpaths is bypassed there. `norecursedirs` is the ONE knob pytest honors
# even with explicit paths — it prunes during recursion. Without this, an audit
# through Detective still walks into `mutants/` and re-hits the duplicate-conftest
# ImportPathMismatchError even though the CLI path is fine.
norecursedirs = ["mutants", ".venv", "venv", "build", "dist", ".git"]

[tool.mutmut]
paths_to_mutate = ["src/"]
tests_dir = ["tests/"]

[tool.ruff]
src = ["src", "tests"]
exclude = ["mutants", "deploy", ".claude"]

[tool.ruff.lint.per-file-ignores]
"tests/generated/*.py" = ["F401", "F811", "E402"]

[tool.mypy]
files = ["src", "tests"]
exclude = ["^mutants/", "^deploy/", "^\\.claude/"]

[tool.bandit]
exclude_dirs = ["mutants", "deploy", ".claude", "tests"]

[tool.coverage.run]
source = ["src/model_atlas"]
omit = [
    # Worker scripts — standalone, no ModelAtlas imports, run on remote machines
    "src/model_atlas/phase_c_worker.py",
    "src/model_atlas/phase_c1_worker.py",
    "src/model_atlas/phase_c1_extended.py",
    "src/model_atlas/phase_c3_worker.py",
    "src/model_atlas/phase_d_worker.py",
    # CLI entry points — argparse + orchestration, tested via integration
    "src/model_atlas/ingest_cli.py",
    "src/model_atlas/ingest.py",
    "src/model_atlas/ingest_seed.py",
    "src/model_atlas/ingest_vibes.py",
    # External API dependencies — require HF/Ollama/datasets at runtime
    "src/model_atlas/sources/huggingface.py",
    "src/model_atlas/sources/ollama.py",
    "src/model_atlas/sources/base.py",
    "src/model_atlas/ground_truth.py",
    "src/model_atlas/search/structured.py",
    # Wiki CLI
    "src/model_atlas/wiki/__main__.py",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.",
    "if TYPE_CHECKING:",
]

[tool.wesker]
source_dir = "src/model_atlas"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
