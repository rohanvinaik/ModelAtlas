# LintGate configuration — generated by scaffold_config
# Review and adjust to match your project's needs.

# Exclude generated/non-source directories from file discovery
exclude_paths:
  - "mutants/"
  - "deploy/"
  - ".claude/"

pipeline_critical_paths:
  - "src/model_atlas/server.py"

# MCP tool functions have flat arg signatures by design (LLM-visible schema).
# Suppress too-many-args for these functions.
# Format: dict keyed by linter name, then by file path.
exemptions:
  lint:
    "tests/test_extraction.py":
      codes: ["maintainability"]
      reason: "Large test file with many small test functions — low MI is structural, not a quality issue"
    "tests/test_patterns.py":
      codes: ["maintainability"]
      reason: "Large test file with many small test functions — low MI is structural, not a quality issue"
    "tests/generated/test_prescriptive_deterministic.py":
      codes: ["maintainability"]
      reason: "Prescriptive test file accumulating tests for all deterministic.py functions — MI not meaningful for test files"
  structure:
    "src/model_atlas/server.py":
      codes: ["too-many-args"]
      reason: "MCP tool functions require flat parameter signatures for LLM tool schema visibility"
    "src/model_atlas/spreading.py":
      codes: ["too-many-args"]
      reason: "Internal spreading functions pass through activation state — acceptable coupling"
    "src/model_atlas/extraction/vibes.py":
      codes: ["too-many-args"]
      reason: "build_vibe_prompt maps directly to model metadata fields — splitting would obscure the 1:1 field mapping"
    "tests/test_formatting.py":
      codes: ["too-many-args"]
      reason: "Test helper _make_structured mirrors the structured output schema — splitting adds indirection"
  ty:
    "src/model_atlas/extraction/vibes.py":
      codes: ["unresolved-import", "attr-defined"]
      reason: "Optional deps (outlines, transformers) — only installed with [ingest] extras"
    "src/model_atlas/ground_truth.py":
      codes: ["unresolved-import"]
      reason: "Optional dep (datasets) — only installed with [ingest] extras"
    "src/model_atlas/ingest_seed.py":
      codes: ["attr-defined"]
      reason: "HfApi model info object — typed as object due to optional huggingface_hub dep"
    "src/model_atlas/ingest_vibes.py":
      codes: ["unresolved-attribute", "call-non-callable"]
      reason: "Vibe extractor result typed as object — optional dep boundary"
    "src/model_atlas/phase_c1_extended.py":
      codes: ["unresolved-import"]
      reason: "Optional deps (datasets, torch, transformers) — only installed with [ingest] extras"
    "src/model_atlas/phase_c1_worker.py":
      codes: ["unresolved-import"]
      reason: "Optional deps (torch, transformers) — only installed with [ingest] extras"
    "src/model_atlas/phase_c3_worker.py":
      codes: ["unresolved-import"]
      reason: "Optional dep (openai) — only installed on worker machines"
    "src/model_atlas/phase_c_worker.py":
      codes: ["unresolved-import"]
      reason: "Optional dep (openai) — only installed on worker machines"
    "src/model_atlas/phase_d_worker.py":
      codes: ["unresolved-import"]
      reason: "Optional dep (openai) — only installed on worker machines"
  mypy:
    "src/model_atlas/extraction/vibes.py":
      codes: ["import-untyped", "attr-defined"]
      reason: "Optional deps (outlines, transformers) lack type stubs"
    "src/model_atlas/ingest_seed.py":
      codes: ["attr-defined"]
      reason: "HfApi model info typed as object — optional dep boundary"
    "src/model_atlas/ingest_vibes.py":
      codes: ["attr-defined"]
      reason: "Vibe extractor result typed as object — optional dep boundary"
    "src/model_atlas/ground_truth.py":
      codes: ["import-untyped"]
      reason: "datasets package lacks type stubs"
    "scripts/wiki_transforms.py":
      codes: ["valid-type"]
      reason: "Uses Callable type annotation via builtins.callable — mypy false positive"
  radon:
    "tests/test_extraction.py":
      codes: ["maintainability"]
      reason: "Large test file with many inline fixtures — low MI expected for test modules"
    "tests/test_patterns.py":
      codes: ["maintainability"]
      reason: "Pattern test file with data-heavy assertions — low MI expected"

controlplane:
  enabled: true
  latency_budget_ms: 120000  # 2 min; dynamic budget scales further in MCP surface
  severity_weighted_coherence: true
  channels:
    behavior:
      enabled: true
      thresholds:
        approach_cycling_count: 3
        failure_amnesia_lookback: 30
  inquiry:
    theory_grounded_signals: true
    prediction_tracking: true
    theory_coherence_check: true
    living_context: true
    session_gate: true
  - file: src/model_atlas/server.py
    code: too-many-args
    rationale: "MCP tool function — 13 arguments map directly to the LLM-visible tool schema. Reducing args would require the LLM to construct a nested object, breaking the flat parameter convention MCP tools use."
    kill_rate: 1.0
    approved_at: 2026-03-23 18:51:05
  - file: src/model_atlas/spreading.py
    code: too-many-args
    rationale: "Internal spreading function passes through activation state (conn, model_id, current_act, depth, decay, anchor_slice, banks, activation dict, priority queue). These are the Bellman-Ford algorithm's working state — grouping them into a dataclass would add indirection without reducing actual coupling."
    kill_rate: 1.0
    approved_at: 2026-03-23 18:51:28
  - file: src/model_atlas/extraction/vibes.py
    code: too-many-args
    rationale: "Prompt builder maps 11 args to 11 model metadata fields — each is a distinct HF API field. Splitting obscures the 1:1 mapping."
    kill_rate: 1.0
    approved_at: 2026-03-23 18:52:22

