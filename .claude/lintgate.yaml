# LintGate configuration — generated by scaffold_config
# Review and adjust to match your project's needs.

# Exclude generated/non-source directories from file discovery
exclude_paths:
  - "mutants/"
  - "deploy/"
  - ".claude/"

pipeline_critical_paths:
  - "src/model_atlas/server.py"

# MCP tool functions have flat arg signatures by design (LLM-visible schema).
# Suppress too-many-args for these functions.
exemptions:
  - file: "src/model_atlas/server.py"
    codes: ["too-many-args"]
    rationale: "MCP tool functions require flat parameter signatures for LLM tool schema visibility"
  - file: "src/model_atlas/spreading.py"
    codes: ["too-many-args"]
    rationale: "Internal spreading functions pass through activation state — acceptable coupling"

controlplane:
  enabled: true
  severity_weighted_coherence: true
  channels:
    behavior:
      enabled: true
      thresholds:
        approach_cycling_count: 3
        failure_amnesia_lookback: 30
  inquiry:
    theory_grounded_signals: true
    prediction_tracking: true
    theory_coherence_check: true
    living_context: true
    session_gate: true

